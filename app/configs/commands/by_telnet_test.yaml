    retry_count: 1
    retry_delay_ms: 1000
    wait_before_ms: 0
    wait_after_ms: 1000
    continue_on_failure: false
  variable_extraction:
    enabled: false
    variable_name: ''
    pattern: ''
    match_group: 1
  condition:
    enabled: false
    condition_type: always
    variable_name: ''
    expected_value: ''
    pattern: ''
  parameters:
    enabled: true
    template: yotc_test set_ethernet_mac {$Mac}
    variables:
      Mac: ''

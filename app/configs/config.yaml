mes:
  base_url: http://10.50.1.148/MESAPI/Common/Call
  rescode: ATP1-A2001
  user_code: XL0155
  user_pwd: XL0155
  mo_code: SCJG-20240815-0035
  description: XL_BY MES系统
  field_mappings:
  - mes_field: Mac
    local_field: mac_address
    data_type: string
  - mes_field: GponSN
    local_field: gpon_sn
    data_type: string
  - mes_field: LotId
    local_field: lot_id
    data_type: string
  - mes_field: MOId
    local_field: mo_id
    data_type: string
  default_provider: XL_BY
app:
  dpiScale: Auto
  language: zh_CN
  scanner_timeout_ms: 50
  window_count: 8
commands:
  commands:
  - command: show version
    command_type: Character Command
    end_char: '#'
    expect: Cisco
    judge_type: Contains
    match_type: String Match
    variable: ''
  - command: show interfaces
    command_type: Character Command
    end_char: '#'
    expect: up
    judge_type: Contains
    match_type: String Match
    variable: ''
  connection:
    address_list:
    - 192.168.1.2
    - 192.168.1.3
    - 192.168.1.4
    - 192.168.1.5
    - 192.168.1.6
    - 192.168.1.7
    - 192.168.1.8
    - 192.168.1.9
    com_end: ''
    com_list: ''
    com_ports: None
    com_start: ''
    end_char_return: Immediate
    host: 192.168.1.1
    ip_converter: Range
    ip_end: 192.168.1.9
    ip_list: ''
    ip_start: 192.168.1.2
    login_prompt: '>'
    password: admin
    port: 23
    retry_count: 3
    separator: '|'
    timeout_ms: 3000
    username: admin
  protocol: telnet
device_templates:
  Oscilloscope:
    comm_method: VISA
    description: 示波器示例模板
    init_commands:
    - command: '*IDN?'
      wait_ms: 10
    name: Oscilloscope
    type: 示波器
  VISA通用设备:
    comm_method: VISA
    description: 通用VISA设备模板
    init_commands:
    - command: '*RST'
      wait_ms: 100
    - command: SYST:REM
      wait_ms: 50
    name: VISA通用设备
    type: 通用设备
devices:
- devices:
  - comm_method: VISA
    created_time: '2024-01-01'
    description: 自定义设备模板 - by_device_test
    manufacturer: Litepoint
    model: IQStream-5G
    name: by_device_test
    type: 信号发生器
    version: '1.0'
    visa_resource: 192.168.100.254
ui:
  folders:
    download: D:/python-workspace/by_gallery/app/download
    music: []
  main_window:
    dpi_scale: Auto
    language: Auto
    mica_enabled: false
  material:
    blur_radius: 15
  theme:
    color: '#0078d4'
    mode: Auto
  update:
    check_at_startup: true
version_base: 1.1
